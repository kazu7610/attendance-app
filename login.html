<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    綜合エンジニアリング Staff Portal
  </title>

  <link
    rel="stylesheet"
    href="style.css?v=8"
  >

  <link
    rel="manifest"
    href="manifest.json?v=2"
  >

  <link
    rel="apple-touch-icon"
    href="icons/se-apple-touch-icon.png?v=2"
  >

  <meta
    name="theme-color"
    content="#0f172a"
  >
</head>


<body>

  <main class="login-page">

    <section class="login-card">

      <div class="login-title-area">

        <h1>
          綜合エンジニアリング㈱
        </h1>

        <p>
          Staff Portal
        </p>

      </div>


      <label for="loginEmployee">

        氏名

        <select
          id="loginEmployee"
          autocomplete="username"
          disabled
        >
          <option value="">
            社員一覧を読み込み中...
          </option>
        </select>

      </label>


      <label for="loginPassword">

        パスワード

        <input
          id="loginPassword"
          type="password"
          autocomplete="current-password"
          placeholder="パスワードを入力"
        >

      </label>


      <button
        id="loginButton"
        type="button"
        disabled
      >
        読み込み中...
      </button>


      <p
        id="loginMessage"
        class="login-message"
      ></p>

    </section>

  </main>

  <script src="portal-auth.js"></script>
  <script src="login.js?v=3"></script>

</body>

</html>
