<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    向上提案管理｜綜合エンジニアリング㈱
  </title>

  <link
    rel="stylesheet"
    href="style.css?v=6"
  >

  <style>
    /* =========================================
       向上提案管理画面
    ========================================= */

    .improvement-admin-page {
      width: min(100% - 24px, 900px);
      margin: 0 auto;
      padding: 20px 0 60px;
      box-sizing: border-box;
    }


    .improvement-admin-header {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 18px;
  padding: 20px;

  background: #0f172a;
  border-radius: 16px;
}


    .improvement-admin-header h1 {
  margin: 0;
  color: #ffffff;
  font-size: 24px;
  line-height: 1.3;
}


    .improvement-admin-header p {
  margin: 4px 0 0;
  color: #cbd5e1;
  font-size: 13px;
}


    .improvement-admin-back-button {
      width: fit-content;
      padding: 9px 14px;

      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;

      background: #ffffff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
    }


    .improvement-admin-card {
      margin-bottom: 16px;
      padding: 18px;

      background: #ffffff;
      border: 1px solid #dbeafe;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }


    .improvement-admin-card h2 {
      margin: 0 0 14px;
      color: #0f172a;
      font-size: 18px;
    }


    .improvement-admin-toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }


    .improvement-admin-toolbar label,
    .improvement-admin-edit-form label {
      display: flex;
      flex-direction: column;
      gap: 6px;

      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }


    .improvement-admin-toolbar input,
    .improvement-admin-edit-form input,
    .improvement-admin-edit-form select,
    .improvement-admin-edit-form textarea {
      width: 100%;
      padding: 11px 12px;

      box-sizing: border-box;

      color: #0f172a;
      font: inherit;

      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
    }


    .improvement-admin-edit-form textarea {
      min-height: 120px;
      resize: vertical;
    }


    .improvement-admin-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }


    .improvement-admin-buttons button {
      min-height: 42px;
      padding: 10px 16px;

      font-size: 14px;
      font-weight: 700;

      border-radius: 10px;
      cursor: pointer;
    }


    .improvement-admin-primary-button {
      color: #ffffff;
      background: #2563eb;
      border: 1px solid #2563eb;
    }


    .improvement-admin-secondary-button {
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }


    .improvement-admin-danger-button {
      color: #b45309;
      background: #fffbeb;
      border: 1px solid #fde68a;
    }


    .improvement-admin-summary {
      color: #475569;
      font-size: 13px;
      font-weight: 700;
    }


    .improvement-admin-department-title {
      margin: 18px 0 8px;
      padding-bottom: 6px;

      color: #1e3a8a;
      font-size: 15px;

      border-bottom: 1px solid #dbeafe;
    }


    .improvement-admin-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }


    .improvement-admin-row {
      width: 100%;
      padding: 12px 14px;

      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;

      text-align: left;

      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
    }


    .improvement-admin-row:hover {
      background: #f8fafc;
    }


    .improvement-admin-row-name {
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
    }


    .improvement-admin-status {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }


    .improvement-admin-status-submitted {
      color: #166534;
    }


    .improvement-admin-status-draft {
      color: #b45309;
    }


 .improvement-admin-status-not-submitted {
  padding: 4px 9px;

  color: #be123c;

  background: #fff1f2;
  border: 1px solid #fda4af;
  border-radius: 999px;
}


    .improvement-admin-detail-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }


    .improvement-admin-detail-header h2 {
      margin: 0;
    }


    .improvement-admin-detail-status {
      margin: 4px 0 0;
      font-size: 13px;
      font-weight: 700;
    }


    .improvement-admin-setting-box {
      margin-bottom: 18px;
      padding: 14px;

      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
    }


    .improvement-admin-setting-box p {
      margin: 0 0 8px;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 700;
    }


    .improvement-admin-setting-box strong {
      color: #0f172a;
      font-size: 14px;
      line-height: 1.6;
    }


    .improvement-admin-edit-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }


    .improvement-admin-theme-block {
      padding: 14px;

      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }


    .improvement-admin-theme-block h3 {
      margin: 0 0 12px;
      color: #0f172a;
      font-size: 16px;
    }


    .improvement-admin-message {
      margin: 14px 0;
      padding: 12px 14px;

      font-size: 14px;
      font-weight: 700;
      text-align: center;

      border-radius: 10px;
    }


    .improvement-admin-message.success {
      color: #166534;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }


    .improvement-admin-message.error {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }


    .improvement-admin-message.info {
      color: #1d4ed8;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }


    .improvement-admin-empty {
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }


    .hidden {
      display: none !important;
    }


    @media (min-width: 700px) {
      .improvement-admin-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }


      .improvement-admin-toolbar {
        grid-template-columns: minmax(220px, 1fr) auto;
        align-items: end;
      }


      .improvement-admin-detail-header {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
      }
    }
  </style>
</head>


<body>

  <main class="improvement-admin-page">

    <!-- ==============================
         ヘッダー
    ============================== -->
        <!-- ヘッダー -->
    <header class="improvement-admin-header">

      <div class="improvement-admin-header-text">

        <h1>
          向上提案管理
        </h1>

        <p>
          提出状況・内容修正・CSV出力
        </p>

      </div>

      <button
  type="button"
  onclick="window.location.href='admin.html';"
  style="
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 20px 16px;
    box-sizing: border-box;
    color: #ffffff !important;
    font-size: 18px;
    font-weight: 800;
    text-align: center;
    background-color: #2563eb !important;
    border: 1px solid #2563eb !important;
    border-radius: 18px;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  "
>
  管理画面へ戻る
</button>

    </header>


    <!-- ==============================
         対象月・操作
    ============================== -->
    <section class="improvement-admin-card">

      <h2>
        対象月
      </h2>

      <div class="improvement-admin-toolbar">

        <label>
          対象月を選択

          <input
            id="improvementAdminMonth"
            type="month"
          >
        </label>

        <div class="improvement-admin-buttons">

          <button
            id="improvementAdminReload"
            type="button"
            class="improvement-admin-primary-button"
          >
            更新
          </button>

          <button
            id="improvementAdminExportCsv"
            type="button"
            class="improvement-admin-secondary-button"
          >
            CSV出力
          </button>

        </div>

      </div>

      <div
        id="improvementAdminMessage"
        class="improvement-admin-message hidden"
      ></div>

    </section>

    <!-- ==============================
         今月のテーマ設定
    ============================== -->
    <section class="improvement-admin-card">

      <h2>
        今月のテーマ設定
      </h2>

      <div class="improvement-admin-edit-form">

        <label>
          今月のテーマ

          <textarea
            id="improvementAdminThemeSetting"
            placeholder="今月のテーマを入力してください"
          ></textarea>
        </label>

      </div>

      <div class="improvement-admin-buttons">

        <button
          id="improvementAdminSaveTheme"
          type="button"
          class="improvement-admin-primary-button"
        >
          今月のテーマを保存
        </button>

      </div>

    </section>

    <!-- ==============================
         提出状況一覧
    ============================== -->
    <section
      id="improvementAdminListSection"
      class="improvement-admin-card"
    >

      <div class="improvement-admin-detail-header">

        <div>

          <h2>
            提出状況
          </h2>

          <p
            id="improvementAdminSummary"
            class="improvement-admin-summary"
          >
            読み込み中...
          </p>

        </div>

      </div>

      <div
        id="improvementAdminList"
        class="improvement-admin-list"
      >

        <p class="improvement-admin-empty">
          読み込み中...
        </p>

      </div>

    </section>


    <!-- ==============================
         提出内容の確認・修正
    ============================== -->
    <section
      id="improvementAdminDetailSection"
      class="improvement-admin-card hidden"
    >

      <div class="improvement-admin-detail-header">

        <div>

          <h2 id="improvementAdminEmployeeName">
            向上提案詳細
          </h2>

          <p
            id="improvementAdminDetailStatus"
            class="improvement-admin-detail-status"
          ></p>

        </div>

        <button
          id="improvementAdminCloseDetail"
          type="button"
          class="improvement-admin-secondary-button"
        >
          一覧へ戻る
        </button>

      </div>


      <!-- 月別テーマ表示 -->
      <div class="improvement-admin-setting-box">

        <p>
          今月のテーマ
        </p>

        <strong id="improvementAdminMonthlyTheme">
          読み込み中...
        </strong>

      </div>


      <!-- 修正フォーム -->
      <form
        id="improvementAdminEditForm"
        class="improvement-admin-edit-form"
        novalidate
      >

        <input
          id="improvementAdminRecordId"
          type="hidden"
        >


        <!-- 今月のテーマ回答 -->
        <div class="improvement-admin-theme-block">

          <h3>
            今月のテーマ
          </h3>

          <label>
            本文

            <textarea
              id="improvementAdminMonthlyAnswer"
              placeholder="ここに入力してください"
            ></textarea>
          </label>

        </div>


        <!-- テーマ① -->
        <div class="improvement-admin-theme-block">

          <h3>
            テーマ①
          </h3>

          <label>
            分類

            <select id="improvementAdminTheme1Category">

              <option value="">
                選択してください
              </option>

            </select>
          </label>

          <label>
            本文

            <textarea
              id="improvementAdminTheme1Body"
              placeholder="ここに入力してください"
            ></textarea>
          </label>

        </div>


        <!-- テーマ② -->
        <div class="improvement-admin-theme-block">

          <h3>
            テーマ②
          </h3>

          <label>
            分類

            <select id="improvementAdminTheme2Category">

              <option value="">
                選択してください
              </option>

            </select>
          </label>

          <label>
            本文

            <textarea
              id="improvementAdminTheme2Body"
              placeholder="ここに入力してください"
            ></textarea>
          </label>

        </div>


        <!-- テーマ③ -->
        <div class="improvement-admin-theme-block">

          <h3>
            テーマ③
          </h3>

          <label>
            分類

            <select id="improvementAdminTheme3Category">

              <option value="">
                選択してください
              </option>

            </select>
          </label>

          <label>
            本文

            <textarea
              id="improvementAdminTheme3Body"
              placeholder="ここに入力してください"
            ></textarea>
          </label>

        </div>


        <!-- 管理者操作 -->
        <div class="improvement-admin-buttons">

          <button
            id="improvementAdminSaveChanges"
            type="submit"
            class="improvement-admin-primary-button"
          >
            修正内容を保存
          </button>

          <button
            id="improvementAdminReturnDraft"
            type="button"
            class="improvement-admin-danger-button"
          >
            再編集可能に戻す
          </button>

        </div>

      </form>

    </section>

  </main>


  <script src="portal-auth.js"></script>
  <script src="improvement-admin.js?v=8"></script>

</body>

</html>
