<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>工事部ポータル - 管理画面</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <header class="page-header">

  <div>
    <h1>
  綜合エンジニアリング㈱
  <span class="portal-subtitle">
    Staff Portal
  </span>
</h1>

<p>出勤簿管理</p>
  </div>

  <a
    href="home.html"
    class="home-back-button"
  >
    ホームへ戻る
  </a>

</header>

  <main>

    <!-- ==============================
         対象月
    ============================== -->
    <section class="card">

      <h2>出勤簿管理</h2>

      <label>
        対象月

        <input
          id="month"
          type="month"
        >
      </label>

      <div class="buttons">

        <button
          id="reload"
          type="button"
        >
          更新
        </button>

        <button
          id="exportAllCsv"
          type="button"
        >
          全員分CSV出力
        </button>

      </div>

    </section>

    <!-- ==============================
     予定登録
============================== -->
<section class="card">

  <h2>予定登録</h2>

  <label>
    日付

    <input
      id="scheduleDate"
      type="date"
    >
  </label>

  <label>
    開始時刻

    <input
      id="scheduleStartTime"
      type="time"
    >
  </label>

  <label>
    予定名

    <input
      id="scheduleTitle"
      type="text"
      placeholder="例：安全会議"
    >
  </label>

  <label>
    詳細

    <input
      id="scheduleDetails"
      type="text"
      placeholder="例：会議室で実施"
    >
  </label>

  <label>
    対象

    <select id="scheduleTargetScope">

      <option value="all">
        全員
      </option>

      <option value="工事部">
        工事部
      </option>

      <option value="技術部">
        技術部
      </option>

      <option value="営業">
        営業
      </option>

      <option value="総務">
        総務
      </option>

    </select>
  </label>

  <div class="buttons">

    <button
      id="addSchedule"
      type="button"
    >
      予定を登録
    </button>

  </div>

  <p
    id="scheduleMessage"
    class="schedule-message"
  ></p>

</section>

    <!-- ==============================
         提出状況一覧
    ============================== -->
    <section
      id="statusSection"
      class="card"
    >

      <div class="title">

        <h2>提出状況</h2>

        <span id="submissionSummary">
          0 / 0人
        </span>

      </div>

      <div id="attendanceList">
        読込中...
      </div>

    </section>


    <!-- ==============================
         個人出勤簿詳細
    ============================== -->
    <section
      id="detailSection"
      class="card hidden"
    >

      <div class="admin-detail-header">

        <div>

          <h2 id="detailEmployeeName">
            出勤簿詳細
          </h2>

          <p id="detailStatus"></p>

        </div>

        <button
          id="closeDetail"
          class="secondary-button"
          type="button"
        >
          一覧へ戻る
        </button>

      </div>

      <div
        id="attendanceDetail"
        class="attendance-detail"
      ></div>

    </section>

  </main>

  <script src="admin.js"></script>

</body>

</html>
