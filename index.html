<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工事部ポータル - 出勤簿</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>工事部ポータル</h1>
    <p>出勤簿 Ver0.1</p>
  </header>

  <main>
    <section class="card">
      <h2>基本情報</h2>

      <label>
        部
        <select id="department">
          <option value="">部を選択してください</option>
        </select>
      </label>

      <label>
        氏名
        <select id="employee" disabled>
          <option value="">先に部を選択してください</option>
        </select>
      </label>

      <label>
        対象月
        <input id="month" type="month">
      </label>

      <div class="buttons">
        <button id="makeRows">月を表示</button>
        <button id="saveLocal">保存</button>
        <button id="exportCsv">CSV出力</button>
      </div>
    </section>

    <section class="card">
      <div class="title">
        <h2>勤務入力</h2>
        <span id="summary">0件入力</span>
      </div>
      <div id="rows"></div>
    </section>
  </main>

  <template id="dayTemplate">
    <div class="day-row">
      <div class="date-box">
        <div class="day"></div>
        <div class="week"></div>
      </div>

      <label>
        現場
        <select class="site">
          <option value=""></option>
          <option value="S001" data-type="normal">トヨタスポーツ</option>
          <option value="S002" data-type="normal">キャッスル</option>
          <option value="S003" data-type="normal">イビデン河間</option>
          <option value="SK001" data-type="normal">N3</option>
          <option value="SZ001" data-type="misc">三機雑工事</option>
          <option value="SKZ001" data-type="misc">三晃雑工事</option>
          <option value="ASZ001" data-type="misc">朝日雑工事</option>
          <option value="NSZ001" data-type="misc">西原雑工事</option>
          <option value="SOZ001" data-type="misc">自社雑工事</option>
        </select>
      </label>

      <label class="misc hidden">
        雑工事名
        <input class="miscName" type="text" placeholder="例：市大">
      </label>

      <label>
        開始
        <select class="start"></select>
      </label>

      <label>
        終了
        <select class="end"></select>
      </label>

      <label>
        備考
        <input class="note" type="text">
      </label>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
