<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    綜合エンジニアリング㈱ Staff Portal
  </title>

  <link
    rel="stylesheet"
    href="style.css?v=2"
  >
</head>

<body>

  <main class="home-page">

    <!-- ==============================
         ヘッダー
    ============================== -->
    <header class="home-header">

      <div>

        <h1>
          綜合エンジニアリング㈱
          <br>

          <span class="portal-subtitle">
            Staff Portal
          </span>
        </h1>

        <p id="welcomeMessage">
          読み込み中...
        </p>

      </div>

      <button
        id="logoutButton"
        type="button"
        class="logout-button"
      >
        ログアウト
      </button>

    </header>


    <!-- ==============================
         ホームメニュー
    ============================== -->
    <section class="home-menu">

      <!-- 上段 2列×2段 -->
      <div class="home-menu-grid">

        <!-- 出勤簿 -->
        <a
          href="index.html"
          class="home-square-card"
        >

         <div class="home-square-icon">
  <svg
    viewBox="0 0 24 24"
    aria-hidden="true"
  >
    <path
      d="M9 5h6m-7 4h8m-8 4h8m-8 4h5M9 3h6l1 2h3v16H5V5h3l1-2Z"
    />
  </svg>
</div>

          <div class="home-square-text">
            <h2>出勤簿</h2>
            <p>勤務時間・現場を入力</p>
          </div>

        </a>


       <!-- 向上提案 -->
<a
  href="#"
  class="home-square-card"
  onclick="return false;"
>
  <div class="home-square-icon">
    <svg
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        d="M9 18h6m-5 3h4M8.5 14.5C7 13.4 6 11.7 6 9.5a6 6 0 1 1 12 0c0 2.2-1 3.9-2.5 5-1 .8-1.5 1.6-1.5 2.5h-4c0-.9-.5-1.7-1.5-2.5Z"
      />
    </svg>
  </div>

  <div class="home-square-text">
    <h2>向上提案</h2>
    <p>より良い仕事のアイデアを共有</p>
  </div>
</a>


<!-- ヒヤリハット -->
<a
  href="#"
  class="home-square-card"
  onclick="return false;"
>
  <div class="home-square-icon">
    <svg
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        d="M12 3 2.8 20h18.4L12 3Zm0 6v5m0 3v.1"
      />
    </svg>
  </div>

  <div class="home-square-text">
    <h2>ヒヤリハット</h2>
    <p>気づいた危険を共有</p>
  </div>
</a>

        <!-- 現場搬入予定表 -->
        <a
          href="#"
          id="deliveryCalendarLink"
          class="home-square-card"
          target="_blank"
          rel="noopener noreferrer"
        >

          <div class="home-square-icon">
  <svg
    viewBox="0 0 24 24"
    aria-hidden="true"
  >
    <path
      d="M3 6h11v10H3V6Zm11 4h4l3 3v3h-7v-6ZM7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm10 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"
    />
  </svg>
</div>

          <div class="home-square-text">
            <h2>現場搬入予定表</h2>
            <p>Googleカレンダー</p>
          </div>

        </a>

      </div>


      <!-- ==============================
           今日・明日の予定
      ============================== -->
      <a
        href="schedule.html"
        class="schedule-card"
      >

        <div class="schedule-card-header">

          <div>

            <p class="schedule-card-label">
              TODAY & TOMORROW
            </p>

            <h2>
              今日・明日の予定
            </h2>

          </div>

          <div class="today-date-icon">

            <span id="todayDateMonth">
              --月
            </span>

            <strong id="todayDateDay">
              --
            </strong>

          </div>

        </div>

        <div id="todayScheduleList">

          <p class="schedule-empty-message">
            予定を読み込み中...
          </p>

        </div>

        <div class="schedule-card-footer">
          予定表を見る
          <span>〉</span>
        </div>

      </a>


      <!-- ==============================
           管理者専用
      ============================== -->
      <a
        href="admin.html"
        id="adminMenu"
        class="home-menu-card admin-menu-card hidden"
      >

        <div class="home-menu-icon">
          ⚙️
        </div>

        <div class="home-menu-text">

          <h2>
            管理画面
          </h2>

          <p>
            管理者専用
          </p>

        </div>

        <span class="home-menu-arrow">
          〉
        </span>

      </a>

    </section>

  </main>

  <script src="home.js"></script>

</body>
</html>
