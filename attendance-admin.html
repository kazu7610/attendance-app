<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    工事部ポータル - 出勤簿管理
  </title>

  <link
    rel="stylesheet"
    href="style.css?v=7"
  >
</head>


<body>

  <main class="admin-home-page">

    <!-- ==============================
         ヘッダー
    ============================== -->
    <header class="admin-home-header">

      <div class="admin-home-header-text">

        <h1>
          綜合エンジニアリング㈱

          <span class="admin-home-portal-title">
            Staff Portal
          </span>
        </h1>

        <p>
          出勤簿管理
        </p>

      </div>

      <a
        href="admin.html"
        class="admin-home-back-button"
      >
        管理画面へ戻る
      </a>

    </header>


    <!-- ==============================
         出勤簿管理
    ============================== -->
    <section class="admin-section-card">

      <h2>
        出勤簿管理
      </h2>

      <label class="admin-form-label">

        対象月

        <input
          id="month"
          type="month"
          class="admin-form-control"
        >

      </label>

      <div class="admin-action-buttons">

        <button
          id="reload"
          type="button"
          class="admin-primary-button"
        >
          更新
        </button>

        <button
          id="exportAllCsv"
          type="button"
          class="admin-primary-button"
        >
          全員分CSV出力
        </button>

      </div>

    </section>


    <!-- ==============================
         提出状況一覧
    ============================== -->
    <section
      id="statusSection"
      class="admin-section-card"
    >

      <div class="admin-section-title-row">

        <h2>
          提出状況
        </h2>

        <span
          id="submissionSummary"
          class="admin-submission-summary"
        >
          0 / 0人
        </span>

      </div>

      <div id="attendanceList">
        読込中...
      </div>

    </section>


    <!-- ==============================
         個人出勤簿詳細
    ============================== -->
    <section
      id="detailSection"
      class="admin-section-card hidden"
    >

      <div class="admin-detail-header">

        <div>

          <h2 id="detailEmployeeName">
            出勤簿詳細
          </h2>

          <p id="detailStatus"></p>

        </div>

        <button
          id="closeDetail"
          class="admin-secondary-button"
          type="button"
        >
          一覧へ戻る
        </button>

      </div>

      <div
        id="attendanceDetail"
        class="attendance-detail"
      ></div>

    </section>

  </main>


  <script src="attendance-admin.js?v=1"></script>

</body>

</html>
